<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colagem CGB</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f0f0f0; color: #222; min-height: 100vh; padding: 12px; }
  header { display: flex; align-items: center; justify-content: center; padding: 10px 0 14px; }
  header img { height: 44px; }
  #drop-zone {
    border: 2px dashed #bbb; border-radius: 12px; padding: 28px 16px;
    text-align: center; cursor: pointer; margin-bottom: 12px;
    background: #fff; transition: background 0.2s;
  }
  #drop-zone:active { background: #f5f5f5; }
  #drop-zone .icon { font-size: 36px; }
  #drop-zone p { color: #666; font-size: 14px; margin-top: 6px; }
  #drop-zone small { color: #aaa; font-size: 12px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: flex-end; }
  .grupo { display: flex; flex-direction: column; gap: 3px; }
  .grupo label { font-size: 12px; color: #666; }
  select {
    font-size: 14px; padding: 7px 10px; border-radius: 8px;
    border: 1px solid #ccc; background: #fff; color: #222;
  }
  .btn { padding: 9px 18px; font-size: 14px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; transition: background 0.2s; }
  .btn-gerar { background: #b8001f; color: #fff; }
  .btn-gerar:active { background: #90001a; }
  .btn-baixar { background: #1a7a3a; color: #fff; display: none; }
  .btn-baixar:active { background: #155f2c; }
  .btn-limpar { background: #ddd; color: #333; }
  #preview-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; min-height: 4px; }
  .thumb-wrap { position: relative; display: inline-block; }
  .thumb-wrap img { width: 68px; height: 68px; object-fit: cover; border-radius: 8px; border: 2px solid #ddd; display: block; }
  .remover {
    position: absolute; top: 2px; right: 2px; width: 20px; height: 20px;
    background: rgba(0,0,0,0.6); border: none; border-radius: 50%;
    color: #fff; font-size: 13px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; padding: 0;
  }
  canvas { width: 100%; border-radius: 10px; display: none; margin-top: 8px; border: 1px solid #ddd; }
  #status { font-size: 13px; color: #888; text-align: center; margin-top: 8px; min-height: 18px; }
</style>
</head>

<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  <div class="icon">📷</div>
  <p>Toque aqui para escolher as fotos</p>
  <small>Até 6 imagens</small>
</div>
<input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">

<div class="row">
  <div class="grupo">
    <label>Layout</label>
    <select id="layout-select">
      <option value="auto">Automático</option>
      <option value="2col">2 colunas</option>
      <option value="3col">3 colunas</option>
      <option value="grid22">Grade 2x2</option>
      <option value="featured">Destaque + grade</option>
    </select>
  </div>
  <div class="grupo">
    <label>Espaço</label>
    <select id="gap-select">
      <option value="0">Sem espaço</option>
      <option value="4" selected>Pequeno</option>
      <option value="10">Médio</option>
      <option value="20">Grande</option>
    </select>
  </div>
</div>

<div class="row">
  <button class="btn btn-gerar" onclick="generateCollage()">⚡ Gerar colagem</button>
  <button class="btn btn-baixar" id="btn-baixar" onclick="downloadCollage()">⬇️ Baixar</button>
  <button class="btn btn-limpar" onclick="limpar()">🗑️ Limpar</button>
</div>

<div id="preview-strip"></div>
<canvas id="collage-canvas"></canvas>

const FRASE = "SEGURANÇA ATIVA NOSSO DNA 🧬";

let imageFiles = [];
let loadedImages = [];
let logoImg = null;

const logoLoader = new Image();
logoLoader.onload = () => { logoImg = logoLoader; };
logoLoader.src = LOGO_SRC;

function handleFiles(files) {
  const arr = Array.from(files).filter(f => f.type.startsWith('image/'));
  imageFiles = [...imageFiles, ...arr].slice(0, 6);
  loadImages();
}

function loadImages() {
  loadedImages = [];
  document.getElementById('preview-strip').innerHTML = '';
  if (!imageFiles.length) return;
  setStatus('Carregando imagens...');
  let loaded = 0;
  imageFiles.forEach((file, i) => {
    const img = new Image();
    img.onload = () => {
      loadedImages[i] = img;
      loaded++;
      if (loaded === imageFiles.length) {
        renderPreviews();
        setStatus(imageFiles.length + ' imagem(ns) pronta(s). Toque em "Gerar colagem".');
      }
    };
    img.src = URL.createObjectURL(file);
  });
}

function renderPreviews() {
  const strip = document.getElementById('preview-strip');
  strip.innerHTML = '';
  imageFiles.forEach((file, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'thumb-wrap';
    const thumb = document.createElement('img');
    thumb.src = URL.createObjectURL(file);
    const btn = document.createElement('button');
    btn.className = 'remover';
    btn.innerHTML = '✕';
    btn.onclick = () => { imageFiles.splice(i, 1); loadImages(); };
    wrap.appendChild(thumb);
    wrap.appendChild(btn);
    strip.appendChild(wrap);
  });
}

function getDateTime() {
  const now = new Date();
  const data = now.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const hora = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  return data + ' às ' + hora;
}

function drawCabecalho(ctx, W, cabH) {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, cabH);

  const logoH = cabH * 0.45;
  const logoW = logoImg ? logoImg.naturalWidth * (logoH / logoImg.naturalHeight) : 0;
  const logoY = cabH * 0.12;
  const logoX = (W - logoW) / 2;

  if (logoImg) ctx.drawImage(logoImg, logoX, logoY, logoW, logoH);

  const dateFontSize = Math.round(W * 0.016);
  ctx.font = dateFontSize + 'px sans-serif';
  ctx.fillStyle = '#888888';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(getDateTime(), W / 2, logoY + logoH + (cabH * 0.22));

  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, cabH - 1);
  ctx.lineTo(W, cabH - 1);
  ctx.stroke();

  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';
}

function drawRodape(ctx, W, rodapeH, rodapeY) {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, rodapeY, W, rodapeH);

  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, rodapeY + 1);
  ctx.lineTo(W, rodapeY + 1);
  ctx.stroke();

  const fontSize = Math.round(W * 0.022);
  ctx.font = 'bold ' + fontSize + 'px sans-serif';
  ctx.fillStyle = '#222222';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(FRASE, W / 2, rodapeY + rodapeH / 2);

  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';
}

function buildCanvas(imgs, W, gap, photosH, canvas, ctx, drawPhotos) {
  const cabH = 120;
  const rodapeH = 80;
  const H = cabH + photosH + rodapeH;

  canvas.width = W;
  canvas.height = H;

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  drawCabecalho(ctx, W, cabH);
  drawPhotos(cabH);
  drawRodape(ctx, W, rodapeH, cabH + photosH);
  showCanvas(canvas);
}

function generateCollage() {
  const imgs = loadedImages.filter(Boolean);
  if (imgs.length < 2) { setStatus('⚠️ Adicione pelo menos 2 imagens.'); return; }

  const layout = document.getElementById('layout-select').value;
  const gap = parseInt(document.getElementById('gap-select').value);
  const canvas = document.getElementById('collage-canvas');
  const ctx = canvas.getContext('2d');
  const W = 1200;
  const n = imgs.length;

  if (layout === 'featured') {
    const mainH = Math.round(W * 0.55);
    const smCount = Math.min(n - 1, 3);
    const smW = Math.floor((W - gap * (smCount - 1)) / smCount);
    const smH = Math.round(smW * 0.65);
    const photosH = mainH + gap + smH;
    buildCanvas(imgs, W, gap, photosH, canvas, ctx, (offsetY) => {
      drawCover(ctx, imgs[0], 0, offsetY, W, mainH);
      for (let i = 0; i < smCount; i++) {
        if (!imgs[i + 1]) break;
        drawCover(ctx, imgs[i + 1], i * (smW + gap), offsetY + mainH + gap, smW, smH);
      }
    });
    return;
  }

  let cols, rows;
  if (layout === '2col') { cols = 2; rows = Math.ceil(n / 2); }
  else if (layout === '3col') { cols = 3; rows = Math.ceil(n / 3); }
  else if (layout === 'grid22') { cols = 2; rows = 2; }
  else {
    if (n <= 2) { cols = 2; rows = 1; }
    else if (n === 3) { cols = 3; rows = 1; }
    else if (n === 4) { cols = 2; rows = 2; }
    else { cols = 3; rows = 2; }
  }

  const cellW = Math.floor((W - gap * (cols - 1)) / cols);
  const cellH = Math.round(cellW * 0.75);
  const photosH = cellH * rows + gap * (rows - 1);

  buildCanvas(imgs, W, gap, photosH, canvas, ctx, (offsetY) => {
    imgs.slice(0, cols * rows).forEach((img, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      drawCover(ctx, img, col * (cellW + gap), offsetY + row * (cellH + gap), cellW, cellH);
    });
  });
}

function drawCover(ctx, img, x, y, w, h) {
  const scale = Math.max(w / img.naturalWidth, h / img.naturalHeight);
  const sw = w / scale, sh = h / scale;
  const sx = (img.naturalWidth - sw) / 2, sy = (img.naturalHeight - sh) / 2;
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function showCanvas(canvas) {
  canvas.style.display = 'block';
  document.getElementById('btn-baixar').style.display = '';
  setStatus('✅ Pronto! Toque em "Baixar" para salvar.');
}

function downloadCollage() {
  const canvas = document.getElementById('collage-canvas');
  const a = document.createElement('a');
  const date = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
  a.download = 'colagem_cgb_' + date + '.jpg';
  canvas.toBlob(blob => { a.href = URL.createObjectURL(blob); a.click(); }, 'image/jpeg', 0.93);
}

function limpar() {
  imageFiles = []; loadedImages = [];
  document.getElementById('preview-strip').innerHTML = '';
  const canvas = document.getElementById('collage-canvas');
  canvas.style.display = 'none';
  document.getElementById('btn-baixar').style.display = 'none';
  document.getElementById('file-input').value = '';
  setStatus('');
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
</script>
