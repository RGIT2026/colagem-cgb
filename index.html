<!DOCTYPE html>
<html lang="pt-BR">

<title>Colagem CGB - v7.0</title>
<style>
  :root { --cgb-red: #b8001f; --cgb-dark: #1c1e21; --cgb-gray: #f0f2f5; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--cgb-gray); color: var(--cgb-dark); min-height: 100vh; padding: 10px; }
  .container { max-width: 950px; margin: 0 auto; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.12); border: 1px solid #e0e0e0; }
  .top-accent { height: 6px; background: linear-gradient(90deg, var(--cgb-red) 0%, #ff4d6d 50%, var(--cgb-dark) 100%); width: 100%; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: #fff; }
  header img { height: 40px; }
  header h1 { font-size: 1.2rem; color: var(--cgb-red); font-weight: 800; }
  .main-content { padding: 0 20px 20px 20px; }
  #drop-zone { border: 2px dashed #cbd5e0; border-radius: 12px; padding: 30px 20px; text-align: center; cursor: pointer; margin-bottom: 15px; background: #fafafa; transition: all 0.3s ease; }
  #drop-zone:hover { background: #f1f5f9; border-color: var(--cgb-red); }
  .panel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; }
  select, input[type="text"], input[type="color"] { font-size: 14px; padding: 8px 12px; border-radius: 8px; border: 1px solid #cbd5e0; background: #fff; width: 100%; outline: none; }
  .loc-group { display: flex; gap: 8px; margin-top: 12px; }
  .btn-gps { background: var(--cgb-dark); color: #fff; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: 700; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
  .btn { flex: 1; min-width: 140px; padding: 12px; font-size: 14px; font-weight: 800; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-gerar { background: var(--cgb-red); color: #fff; }
  .btn-baixar { background: var(--cgb-dark); color: #fff; display: none; }
  .btn-share { background: #25d366; color: #fff; display: none; }
  .btn-limpar { background: #fff; color: #64748b; border: 1px solid #cbd5e0; }
  .btn-ia { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: #fff; position: absolute; top: 10px; right: 15px; padding: 6px 12px; font-size: 10px; border-radius: 20px; box-shadow: 0 4px 10px rgba(168, 85, 247, 0.3); }
  #preview-strip { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 15px; padding: 10px; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; min-height: 40px; }
  .thumb { position: relative; display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .thumb img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid #e2e8f0; }
  .thumb input { width: 80px; font-size: 10px; padding: 4px; border: 1px solid #cbd5e0; border-radius: 4px; outline: none; text-align: center; }
  .thumb input:focus { border-color: var(--cgb-red); }
  .del { position: absolute; top: -5px; right: -5px; width: 20px; height: 20px; background: #ef4444; color: #fff; border-radius: 50%; border: none; cursor: pointer; font-weight: bold; font-size: 10px; z-index: 10; }
  .canvas-wrap { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); display: none; }
  canvas { display: block; max-width: 100%; height: auto; margin: 0 auto; }
  #status { font-size: 13px; color: #64748b; text-align: center; margin-top: 10px; font-weight: 700; }
  .panel-title { font-size: 11px; font-weight: 800; color: var(--cgb-red); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  .qty-selector { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .qty-selector label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; }
  .qty-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #cbd5e0; background: #fff; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .qty-btn:hover { background: var(--cgb-red); color: #fff; border-color: var(--cgb-red); }
  .qty-display { font-size: 18px; font-weight: 800; color: var(--cgb-dark); min-width: 32px; text-align: center; }
</style>
</head>

let images = [], loadedImgs = [], captions = [], logo = null, maxPhotos = 12;

const CGB_PHRASES = [
  "SEGURANÇA ATIVA NOSSO DNA 🧬",
  "QUALIDADE E COMPROMISSO EM CADA OBRA 🏗️",
  "INFRAESTRUTURA QUE CONSTRÓI O FUTURO 🚀",
  "FOCO NA SEGURANÇA, EXCELÊNCIA NA ENTREGA ✅",
  "CGB: TRANSFORMANDO PROJETOS EM REALIDADE 💎",
  "NOSSA EQUIPE É NOSSA MAIOR FORÇA 💪",
  "CONSTRUINDO COM ÉTICA E RESPONSABILIDADE 🤝",
  "ZERO ACIDENTES: NOSSO MAIOR OBJETIVO 🛡️"
];

function suggestDesign() {
  const n = images.length;
  const layoutSelect = document.getElementById('layout-select');
  const bgColorInput = document.getElementById('bg-color');
  
  // Lógica de Layout Baseada em N
  if (n === 1) layoutSelect.value = 'auto';
  else if (n === 2) layoutSelect.value = '2col';
  else if (n === 3) layoutSelect.value = 'featured';
  else if (n === 4) layoutSelect.value = '2col';
  else if (n >= 5 && n <= 7) layoutSelect.value = 'featured-double';
  else if (n >= 8) layoutSelect.value = '4col';
  
  // Alternar entre temas CGB
  const themes = ['#ffffff', '#f0f2f5', '#1c1e21'];
  const current = bgColorInput.value;
  let next = themes[(themes.indexOf(current) + 1) % themes.length];
  bgColorInput.value = next;
  
  setStatus('✨ IA: Layout e Cores otimizados!');
}

function suggestPhrase() {
  const footerInput = document.getElementById('footer-text');
  const current = footerInput.value;
  let next;
  do {
    next = CGB_PHRASES[Math.floor(Math.random() * CGB_PHRASES.length)];
  } while (next === current);
  footerInput.value = next;
  setStatus('💡 IA: Nova frase sugerida!');
}

function changeMaxPhotos(delta) {
  maxPhotos = Math.min(12, Math.max(1, maxPhotos + delta));
  document.getElementById('max-photos-display').textContent = maxPhotos;
  if (images.length > maxPhotos) {
    images = images.slice(0, maxPhotos);
    captions = captions.slice(0, maxPhotos);
    loadAll();
  }
}

const lImg = new Image();
lImg.onload = () => { logo = lImg; };
lImg.src = LOGO_B64;

function getContrastColor(hexColor) {
  const r = parseInt(hexColor.substr(1,2),16);
  const g = parseInt(hexColor.substr(3,2),16);
  const b = parseInt(hexColor.substr(5,2),16);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.5 ? '#1c1e21' : '#ffffff';
}

function getAccentColor(hexColor) {
  const r = parseInt(hexColor.substr(1,2),16);
  const g = parseInt(hexColor.substr(3,2),16);
  const b = parseInt(hexColor.substr(5,2),16);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.5 ? '#b8001f' : '#ff6b81';
}

  if (!navigator.geolocation) return setStatus('GPS não suportado');
  setStatus('📡 Localizando...');
  navigator.geolocation.getCurrentPosition(async (p) => {
    const { latitude, longitude } = p.coords;
    try {
      const r = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+latitude+'&lon='+longitude);
      const d = await r.json();
      const city = d.address.city || d.address.town || d.address.village || '';
      const state = d.address.state || '';
      document.getElementById('loc-input').value = city ? city+', '+state : latitude.toFixed(3)+', '+longitude.toFixed(3);
      setStatus('📍 Localizado!');
    } catch(e) {
      document.getElementById('loc-input').value = latitude.toFixed(3)+', '+longitude.toFixed(3);
    }
  }, () => setStatus('Permissão negada'));
}

function handleFiles(f) {
  const a = Array.from(f).filter(i => i.type.startsWith('image/'));
  const newImages = a.slice(0, maxPhotos - images.length);
  images = [...images, ...newImages];
  newImages.forEach(() => captions.push('')); 
  loadAll();
}

function loadAll() {
  loadedImgs = [];
  document.getElementById('preview-strip').innerHTML = '';
  if (!images.length) return;
  setStatus('⏳ Processando...');
  let c = 0;
  images.forEach((f, i) => {
    const img = new Image();
    img.onload = () => {
      loadedImgs[i] = img;
      c++;
      if (c === images.length) { renderThumbs(); setStatus('✨ Fotos prontas!'); }
    };
    img.src = URL.createObjectURL(f);
  });
}

function renderThumbs() {
  const s = document.getElementById('preview-strip');
  s.innerHTML = '';
  images.forEach((f, i) => {
    const w = document.createElement('div'); w.className = 'thumb';
    const t = document.createElement('img'); t.src = URL.createObjectURL(f);
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Legenda...';
    input.value = captions[i] || '';
    input.oninput = (e) => { captions[i] = e.target.value; };
    const b = document.createElement('button'); b.className = 'del'; b.innerHTML = '×';
    b.onclick = () => { 
      images.splice(i, 1); 
      captions.splice(i, 1);
      loadAll(); 
    };
    w.append(t, input, b); s.append(w);
  });
}

function generateCollage() {
  const imgs = loadedImgs.filter(Boolean);
  if (!imgs.length) return setStatus('⚠️ Adicione fotos primeiro');

  const layout   = document.getElementById('layout-select').value;
  const gap      = parseInt(document.getElementById('gap-select').value);
  const bgColor  = document.getElementById('bg-color').value;
  const phrase   = document.getElementById('footer-text').value;
  const loc      = document.getElementById('loc-input').value;
  const gestor   = document.getElementById('hdr-gestor').value;
  const base     = document.getElementById('hdr-base').value;
  const coord    = document.getElementById('hdr-coordenador').value;
  const superv   = document.getElementById('hdr-supervisor').value;
  const tecfiscal= document.getElementById('hdr-tecfiscal').value;
  const equipe   = document.getElementById('hdr-equipe').value;
  const obra     = document.getElementById('hdr-obra').value;
  const acoes    = document.getElementById('hdr-acoes').value;

  const textColor   = getContrastColor(bgColor);
  const accentColor = getAccentColor(bgColor);

  const canvas = document.getElementById('main-canvas');
  const ctx    = canvas.getContext('2d');
  const W = 1200;
  const pad = W * 0.05;
  const cabH = 190;
  const rodH = 140;
  const textSpace = 45; 

  let cols, rows, phtH = 0;
  let positions = [];

  if (layout === '1col') {
    cols = 1; rows = imgs.length;
    const cH = W * 0.75;
    phtH = (cH + textSpace) * rows + gap * (rows - 1);
    for(let i=0; i<imgs.length; i++) positions.push({x:0, y:cabH + i*(cH + textSpace + gap), w:W, h:cH});
  } else if (layout === '2col') {
    cols = 2; rows = Math.ceil(imgs.length/2);
    const cW = (W - gap)/2; const cH = cW*0.75;
    phtH = (cH + textSpace) * rows + gap * (rows - 1);
    for(let i=0; i<imgs.length; i++) {
      const c = i % 2; const r = Math.floor(i/2);
      positions.push({x:c*(cW+gap), y:cabH + r*(cH+textSpace+gap), w:cW, h:cH});
    }
  } else if (layout === '3col') {
    cols = 3; rows = Math.ceil(imgs.length/3);
    const cW = (W - gap*2)/3; const cH = cW*0.75;
    phtH = (cH + textSpace) * rows + gap * (rows - 1);
    for(let i=0; i<imgs.length; i++) {
      const c = i % 3; const r = Math.floor(i/3);
      positions.push({x:c*(cW+gap), y:cabH + r*(cH+textSpace+gap), w:cW, h:cH});
    }
  } else if (layout === '4col') {
    cols = 4; rows = Math.ceil(imgs.length/4);
    const cW = (W - gap*3)/4; const cH = cW*0.75;
    phtH = (cH + textSpace) * rows + gap * (rows - 1);
    for(let i=0; i<imgs.length; i++) {
      const c = i % 4; const r = Math.floor(i/4);
      positions.push({x:c*(cW+gap), y:cabH + r*(cH+textSpace+gap), w:cW, h:cH});
    }
  } else if (layout === 'featured') {
    const mainH = Math.round(W*0.65);
    const sW = (W - gap*2)/3; const sH = sW*0.75;
    positions.push({x:0, y:cabH, w:W, h:mainH});
    phtH = mainH + textSpace;
    if (imgs.length > 1) {
      const subRows = Math.ceil((imgs.length-1)/3);
      phtH += gap + (sH + textSpace) * subRows;
      for(let i=1; i<imgs.length; i++) {
        const c = (i-1) % 3; const r = Math.floor((i-1)/3);
        positions.push({x:c*(sW+gap), y:cabH + mainH + textSpace + gap + r*(sH+textSpace+gap), w:sW, h:sH});
      }
    }
  } else if (layout === 'featured-double') {
    const mainW = (W - gap)/2; const mainH = mainW*0.75;
    const sW = (W - gap*2)/3; const sH = sW*0.75;
    positions.push({x:0, y:cabH, w:mainW, h:mainH});
    if (imgs[1]) positions.push({x:mainW+gap, y:cabH, w:mainW, h:mainH});
    phtH = mainH + textSpace;
    if (imgs.length > 2) {
      const subRows = Math.ceil((imgs.length-2)/3);
      phtH += gap + (sH + textSpace) * subRows;
      for(let i=2; i<imgs.length; i++) {
        const c = (i-2) % 3; const r = Math.floor((i-2)/3);
        positions.push({x:c*(sW+gap), y:cabH + mainH + textSpace + gap + r*(sH+textSpace+gap), w:sW, h:sH});
      }
    }
  } else if (layout === 'mosaic') {
    let currentY = cabH;
    for(let i=0; i<imgs.length; i++) {
      if (i % 3 === 0) {
        positions.push({x:0, y:currentY, w:W, h:W*0.6});
        currentY += W*0.6 + textSpace + gap;
      } else {
        const cW = (W - gap)/2; const cH = cW*0.75;
        const c = (i % 3) - 1;
        positions.push({x:c*(cW+gap), y:currentY, w:cW, h:cH});
        if (i % 3 === 2 || i === imgs.length - 1) currentY += cH + textSpace + gap;
      }
    }
    phtH = currentY - cabH - gap;
  } else {
    if (imgs.length <= 1) {
      positions.push({x:0, y:cabH, w:W, h:W*0.75});
      phtH = W*0.75 + textSpace;
    } else if (imgs.length <= 4) {
      const cW = (W - gap)/2; const cH = cW*0.75;
      rows = Math.ceil(imgs.length/2);
      phtH = (cH + textSpace) * rows + gap * (rows - 1);
      for(let i=0; i<imgs.length; i++) {
        const c = i % 2; const r = Math.floor(i/2);
        positions.push({x:c*(cW+gap), y:cabH + r*(cH+textSpace+gap), w:cW, h:cH});
      }
    } else {
      const cW = (W - gap*2)/3; const cH = cW*0.75;
      rows = Math.ceil(imgs.length/3);
      phtH = (cH + textSpace) * rows + gap * (rows - 1);
      for(let i=0; i<imgs.length; i++) {
        const c = i % 3; const r = Math.floor(i/3);
        positions.push({x:c*(cW+gap), y:cabH + r*(cH+textSpace+gap), w:cW, h:cH});
      }
    }
  }

  canvas.width  = W;
  canvas.height = cabH + phtH + rodH;
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, canvas.height);

  const grad = ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0, '#b8001f');
  grad.addColorStop(0.5, '#e63946');
  grad.addColorStop(1, '#1c1e21');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, 12);

  if (logo) {
    const p = 14; const lH = cabH - p * 2 - 30;
    const lW = logo.naturalWidth * (lH / logo.naturalHeight);
    ctx.drawImage(logo, p, p, lW, lH);
    const divX = p + lW + 14;
    ctx.fillStyle = '#d1d5db';
    ctx.fillRect(divX, p, 1, cabH - p * 2);
    const gx = divX + 12; const gw = W - gx - p;
    const cw = Math.floor(gw / 4);
    const now = new Date();
    const dateStr = now.toLocaleDateString('pt-BR') + '  |  ' + now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const rowH = 44; const r_gap = 8;
    const totalH = rowH * 3 + r_gap * 2;
    const sy = Math.floor((cabH - totalH) / 2);

    const drawInfo = (label, value, col, span) => {
      const fx = gx + col * cw; const fw = cw * span - 8;
      ctx.textAlign = 'left'; ctx.font = '700 10px sans-serif'; ctx.fillStyle = accentColor;
      ctx.fillText(label, fx, sy + 10);
      ctx.fillStyle = '#e5e7eb'; ctx.fillRect(fx, sy + 13, fw, 1);
      ctx.font = '600 15px sans-serif'; ctx.fillStyle = textColor;
      ctx.fillText(value, fx, sy + 30);
    };

    drawInfo('DATA / HORA', dateStr, 0, 2);
    if (loc) drawInfo('LOCALIZAÇÃO', loc.toUpperCase(), 2, 2);

    const fields = [
      { label: 'GESTOR', value: gestor }, { label: 'BASE', value: base },
      { label: 'COORDENADOR(A)', value: coord }, { label: 'SUPERVISOR(A)', value: superv },
      { label: 'TEC / FISCAL', value: tecfiscal }, { label: 'EQUIPE', value: equipe },
      { label: 'OBRA', value: obra }, { label: 'AÇÕES REALIZADAS', value: acoes }
    ];

    fields.forEach((f, i) => {
      const col = i % 4; const row = Math.floor(i / 4);
      const fx = gx + col * cw; const fy = sy + (rowH + r_gap) * (row + 1);
      ctx.font = '700 10px sans-serif'; ctx.fillStyle = accentColor;
      ctx.fillText(f.label, fx, fy + 10);
      ctx.fillStyle = '#e5e7eb'; ctx.fillRect(fx, fy + 13, cw - 8, 1);
      ctx.font = '700 16px sans-serif'; ctx.fillStyle = f.value ? textColor : '#9ca3af';
      ctx.fillText(f.value || '—', fx, fy + 30);
    });
  }

  ctx.textAlign = 'center';
  imgs.forEach((img, i) => {
    const pos = positions[i];
    if (pos) {
      drawCover(ctx, img, pos.x, pos.y, pos.w, pos.h);
      ctx.fillStyle = textColor;
      const fontSize = pos.w < 400 ? 16 : 22;
      ctx.font = `bold ${fontSize}px sans-serif`;
      ctx.fillText(captions[i].toUpperCase(), pos.x + pos.w/2, pos.y + pos.h + 32);
    }
  });

  const rodY = cabH + phtH;
  ctx.fillStyle = '#1c1e21'; ctx.fillRect(0, rodY, W, rodH);
  ctx.fillStyle = '#b8001f'; ctx.fillRect(0, rodY, W, 4);
  ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; ctx.font = 'bold 36px sans-serif';
  ctx.fillText(phrase, W/2, rodY + rodH/2 + 12);

  if (logo) {
    const lH = rodH * 0.55; const lW = logo.naturalWidth * (lH / logo.naturalHeight);
    ctx.drawImage(logo, W - lW - pad, rodY + (rodH - lH)/2, lW, lH);
  }

  document.getElementById('canvas-wrap').style.display = 'block';
  document.getElementById('btn-baixar').style.display = 'flex';
  document.getElementById('btn-share').style.display = 'flex';
  setStatus('✅ Postagem Gerada!');
}

function drawCover(ctx, img, x, y, w, h) {
  const s = Math.max(w/img.naturalWidth, h/img.naturalHeight);
  const sw = w/s, sh = h/s;
  const sx = (img.naturalWidth - sw)/2, sy = (img.naturalHeight - sh)/2;
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function downloadCollage() {
  const c = document.getElementById('main-canvas');
  const a = document.createElement('a');
  a.download = 'CGB_Post.jpg';
  c.toBlob(b => { a.href = URL.createObjectURL(b); a.click(); }, 'image/jpeg', 0.95);
}

async function shareCollage() {
  const canvas = document.getElementById('main-canvas');
  const obra = document.getElementById('hdr-obra').value || 'Obra';
  const data = new Date().toLocaleDateString('pt-BR');
  canvas.toBlob(async (blob) => {
    const file = new File([blob], `CGB_Post_${obra}.jpg`, { type: 'image/jpeg' });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'CGB Post', text: `Colagem da Obra: ${obra} - Data: ${data}` });
        setStatus('✅ Compartilhado com sucesso!');
      } catch (err) { if (err.name !== 'AbortError') setStatus('❌ Erro ao compartilhar'); }
    } else {
      const text = encodeURIComponent(`Olá, segue a colagem da Obra: ${obra} (${data}). Por favor, anexe a imagem baixada.`);
      window.open(`https://api.whatsapp.com/send?text=${text}`, '_blank');
      setStatus('ℹ️ Link enviado. Baixe a imagem e anexe manualmente.');
    }
  }, 'image/jpeg', 0.95);
}

function limpar() {
  images = []; loadedImgs = []; captions = [];
  document.getElementById('preview-strip').innerHTML = '';
  document.getElementById('canvas-wrap').style.display = 'none';
  document.getElementById('btn-baixar').style.display = 'none';
  document.getElementById('btn-share').style.display = 'none';
  setStatus('');
}

function setStatus(m) { document.getElementById('status').textContent = m; }
