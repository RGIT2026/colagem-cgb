<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colagem CGB - v7.0</title>
<style>
  :root { --cgb-red: #b8001f; --cgb-dark: #1c1e21; --cgb-gray: #f0f2f5; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--cgb-gray); color: var(--cgb-dark); min-height: 100vh; padding: 10px; }
  .container { max-width: 950px; margin: 0 auto; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.12); border: 1px solid #e0e0e0; }
  .top-accent { height: 6px; background: linear-gradient(90deg, var(--cgb-red) 0%, #ff4d6d 50%, var(--cgb-dark) 100%); width: 100%; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: #fff; }
  header img { height: 40px; }
  header h1 { font-size: 1.2rem; color: var(--cgb-red); font-weight: 800; }
  .main-content { padding: 0 20px 20px 20px; }
  #drop-zone { border: 2px dashed #cbd5e0; border-radius: 12px; padding: 30px 20px; text-align: center; cursor: pointer; margin-bottom: 15px; background: #fafafa; transition: all 0.3s ease; }
  #drop-zone:hover { background: #f1f5f9; border-color: var(--cgb-red); }
  .panel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; }
  select, input[type="text"], input[type="color"] { font-size: 14px; padding: 8px 12px; border-radius: 8px; border: 1px solid #cbd5e0; background: #fff; width: 100%; outline: none; }
  .loc-group { display: flex; gap: 8px; margin-top: 12px; }
  .btn-gps { background: var(--cgb-dark); color: #fff; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: 700; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
  .btn { flex: 1; min-width: 140px; padding: 12px; font-size: 14px; font-weight: 800; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; }
  .btn-gerar { background: var(--cgb-red); color: #fff; }
  .btn-baixar { background: var(--cgb-dark); color: #fff; display: none; }
  .btn-limpar { background: #fff; color: #64748b; border: 1px solid #cbd5e0; }
  #preview-strip { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; padding: 10px; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; min-height: 40px; }
  .thumb { position: relative; }
  .thumb img { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; }
  .del { position: absolute; top: -5px; right: -5px; width: 20px; height: 20px; background: #ef4444; color: #fff; border-radius: 50%; border: none; cursor: pointer; font-weight: bold; font-size: 10px; }
  .canvas-wrap { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); display: none; }
  canvas { display: block; max-width: 100%; height: auto; margin: 0 auto; }
  #status { font-size: 13px; color: #64748b; text-align: center; margin-top: 10px; font-weight: 700; }
  .panel-title { font-size: 11px; font-weight: 800; color: var(--cgb-red); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  .qty-selector { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .qty-selector label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; }
  .qty-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #cbd5e0; background: #fff; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .qty-btn:hover { background: var(--cgb-red); color: #fff; border-color: var(--cgb-red); }
  .qty-display { font-size: 18px; font-weight: 800; color: var(--cgb-dark); min-width: 32px; text-align: center; }
</style>
</head>

    <h1>CGB POST <small style="font-size: 0.7rem; color: #94a3b8;">v7.0</small></h1>
  </header>
  <div class="main-content">
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <span style="font-size: 30px;">📸</span>
      <p>Clique para adicionar fotos</p>
    </div>
    <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
    <div id="preview-strip"></div>
    <div class="panel">
      <div class="panel-title">📋 Informações do Cabeçalho</div>
      <div class="grid-4">
        <div class="field">
          <label>Gestor</label>
          <input type="text" id="hdr-gestor" placeholder="Nome do Gestor">
        </div>
        <div class="field">
          <label>Base</label>
          <input type="text" id="hdr-base" placeholder="Nome da Base">
        </div>
        <div class="field">
          <label>Coordenador</label>
          <input type="text" id="hdr-coordenador" placeholder="Nome do Coordenador">
        </div>
        <div class="field">
          <label>Supervisor</label>
          <input type="text" id="hdr-supervisor" placeholder="Nome do Supervisor">
        </div>
        <div class="field">
          <label>Tec / Fiscal</label>
          <input type="text" id="hdr-tecfiscal" placeholder="Nome do Tec/Fiscal">
        </div>
        <div class="field">
          <label>Equipe</label>
          <input type="text" id="hdr-equipe" placeholder="Nome da Equipe">
        </div>
        <div class="field">
          <label>Obra</label>
          <input type="text" id="hdr-obra" placeholder="Nome/Código da Obra">
        </div>
        <div class="field" style="grid-column: span 1;">
          <label>Ações Realizadas</label>
          <input type="text" id="hdr-acoes" placeholder="Ex: Inspeção, Manutenção...">
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">⚙️ Configurações da Colagem</div>
      <div class="qty-selector">
        <label>Qtd. de Fotos na Colagem:</label>
        <button class="qty-btn" onclick="changeMaxPhotos(-1)">−</button>
        <span class="qty-display" id="max-photos-display">12</span>
        <button class="qty-btn" onclick="changeMaxPhotos(1)">+</button>
        <span style="font-size:12px; color:#94a3b8;">(1 a 12 fotos)</span>
      </div>
      <div class="grid-3" style="margin-top:12px;">
        <div class="field">
          <label>Layout</label>
          <select id="layout-select">
            <option value="auto">Auto</option>
            <option value="2col">2 Colunas</option>
            <option value="3col">3 Colunas</option>
            <option value="featured">Destaque</option>
          </select>
        </div>
        <div class="field">
          <label>Espaço</label>
          <select id="gap-select">
            <option value="0">0px</option>
            <option value="12" selected>12px</option>
            <option value="25">25px</option>
          </select>
        </div>
        <div class="field">
          <label>Cor de Fundo</label>
          <input type="color" id="bg-color" value="#ffffff">
        </div>
      </div>
      <div class="loc-group">
        <div class="field" style="flex: 1;">
          <label>Localização</label>
          <input type="text" id="loc-input" placeholder="Ex: São Paulo, SP">
        </div>
        <button class="btn-gps" onclick="getLocation()">📍 GPS</button>
      </div>
      <div class="field" style="margin-top: 12px;">
        <label>Frase do Rodapé</label>
        <input type="text" id="footer-text" value="SEGURANÇA ATIVA NOSSO DNA 🧬">
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-gerar" onclick="generateCollage()">⚡ GERAR POST</button>
      <button class="btn btn-baixar" id="btn-baixar" onclick="downloadCollage()">⬇️ BAIXAR</button>
      <button class="btn btn-limpar" onclick="limpar()">🗑️ LIMPAR</button>
    </div>
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
    </div>
    <p id="status"></p>
  </div>

let images = [], loadedImgs = [], logo = null, maxPhotos = 12;
 
function changeMaxPhotos(delta) {
  maxPhotos = Math.min(12, Math.max(1, maxPhotos + delta));
  document.getElementById('max-photos-display').textContent = maxPhotos;
  if (images.length > maxPhotos) {
    images = images.slice(0, maxPhotos);
    loadAll();
  }
}

lImg.onload = () => { logo = lImg; };
lImg.src = LOGO_B64;
 
// Contraste inteligente: retorna cor de texto que contrasta bem com o fundo
function getContrastColor(hexColor) {
  const r = parseInt(hexColor.substr(1,2),16);
  const g = parseInt(hexColor.substr(3,2),16);
  const b = parseInt(hexColor.substr(5,2),16);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.5 ? '#1c1e21' : '#ffffff';
}
 
// Cor de destaque (vermelho CGB ou claro) para textos secundários
function getAccentColor(hexColor) {
  const r = parseInt(hexColor.substr(1,2),16);
  const g = parseInt(hexColor.substr(3,2),16);
  const b = parseInt(hexColor.substr(5,2),16);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.5 ? '#b8001f' : '#ff6b81';
}
 
async function getLocation() {
  if (!navigator.geolocation) return setStatus('GPS não suportado');
  setStatus('📡 Localizando...');
  navigator.geolocation.getCurrentPosition(async (p) => {
    const { latitude, longitude } = p.coords;
    try {
      const r = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+latitude+'&lon='+longitude);
      const d = await r.json();
      const city = d.address.city || d.address.town || d.address.village || '';
      const state = d.address.state || '';
      document.getElementById('loc-input').value = city ? city+', '+state : latitude.toFixed(3)+', '+longitude.toFixed(3);
      setStatus('📍 Localizado!');
    } catch(e) {
      document.getElementById('loc-input').value = latitude.toFixed(3)+', '+longitude.toFixed(3);
    }
  }, () => setStatus('Permissão negada'));
}
 
function handleFiles(f) {
  const a = Array.from(f).filter(i => i.type.startsWith('image/'));
  images = [...images, ...a].slice(0, maxPhotos);
  loadAll();
}
 
function loadAll() {
  loadedImgs = [];
  document.getElementById('preview-strip').innerHTML = '';
  if (!images.length) return;
  setStatus('⏳ Processando...');
  let c = 0;
  images.forEach((f, i) => {
    const img = new Image();
    img.onload = () => {
      loadedImgs[i] = img;
      c++;
      if (c === images.length) { renderThumbs(); setStatus('✨ Fotos prontas!'); }
    };
    img.src = URL.createObjectURL(f);
  });
}
 
function renderThumbs() {
  const s = document.getElementById('preview-strip');
  s.innerHTML = '';
  images.forEach((f, i) => {
    const w = document.createElement('div'); w.className = 'thumb';
    const t = document.createElement('img'); t.src = URL.createObjectURL(f);
    const b = document.createElement('button'); b.className = 'del'; b.innerHTML = '×';
    b.onclick = () => { images.splice(i, 1); loadAll(); };
    w.append(t, b); s.append(w);
  });
}
 
function generateCollage() {
  const imgs = loadedImgs.filter(Boolean);
  if (!imgs.length) return setStatus('⚠️ Adicione fotos primeiro');
 
  const layout   = document.getElementById('layout-select').value;
  const gap      = parseInt(document.getElementById('gap-select').value);
  const bgColor  = document.getElementById('bg-color').value;
  const phrase   = document.getElementById('footer-text').value;
  const loc      = document.getElementById('loc-input').value;
  const gestor   = document.getElementById('hdr-gestor').value;
  const base     = document.getElementById('hdr-base').value;
  const coord    = document.getElementById('hdr-coordenador').value;
  const superv   = document.getElementById('hdr-supervisor').value;
  const tecfiscal= document.getElementById('hdr-tecfiscal').value;
  const equipe   = document.getElementById('hdr-equipe').value;
  const obra     = document.getElementById('hdr-obra').value;
  const acoes    = document.getElementById('hdr-acoes').value;
 
  // Cores de texto adaptadas ao fundo
  const textColor   = getContrastColor(bgColor);
  const accentColor = getAccentColor(bgColor);
 
  const canvas = document.getElementById('main-canvas');
  const ctx    = canvas.getContext('2d');
  const W = 1200;
  const pad = W * 0.05;
 
  let cols, rows;
  if (layout === '2col')       { cols = 2; rows = Math.ceil(imgs.length/2); }
  else if (layout === '3col')  { cols = 3; rows = Math.ceil(imgs.length/3); }
  else {
    if (imgs.length <= 2)      { cols = 2; rows = 1; }
    else if (imgs.length <= 4) { cols = 2; rows = 2; }
    else                       { cols = 3; rows = Math.ceil(imgs.length/3); }
  }
 
  const cabH = 280;
  const rodH = 140;
  let phtH = 0;
 
  if (layout === 'featured' && imgs.length > 1) {
    phtH = Math.round(W*0.65) + gap + Math.round((W/3)*0.75);
  } else {
    const cW = (W - gap*(cols-1)) / cols;
    phtH = (cW*0.75)*rows + gap*(rows-1);
  }
 
  canvas.width  = W;
  canvas.height = cabH + phtH + rodH;
 
  // Fundo
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, canvas.height);
 
  // Faixa topo
  const grad = ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0, '#b8001f');
  grad.addColorStop(0.5, '#e63946');
  grad.addColorStop(1, '#1c1e21');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, 12);
 
  // ── CABEÇALHO: LOGO ESQUERDA + CAMPOS À DIREITA ──
  if (logo) {
    const lH = cabH * 0.32;
    const lW = logo.naturalWidth * (lH / logo.naturalHeight);
    const lY = 18;
 
    // Logo
    ctx.drawImage(logo, pad, lY, lW, lH);
 
    // Data e hora abaixo da logo
    ctx.fillStyle = textColor;
    ctx.textAlign = 'left';
    ctx.font = 'bold 22px sans-serif';
    const now = new Date();
    const dataStr = now.toLocaleDateString('pt-BR') + ' | ' + now.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
    ctx.fillText(dataStr, pad, lY + lH + 26);
 
    // Localização abaixo da data
    if (loc) {
      ctx.font = '600 20px sans-serif';
      ctx.fillStyle = accentColor;
      ctx.fillText('📍 ' + loc.toUpperCase(), pad, lY + lH + 52);
    }
 
    // Linha divisória vertical separando logo/info dos campos
    const divX = pad + lW + 30;
    ctx.fillStyle = '#e2e8f0';
    ctx.fillRect(divX - 1, 16, 2, cabH - 28);
 
    // ── CAMPOS À DIREITA DA LOGO ──
    // 4 campos por linha, 2 linhas = 8 campos
    const fieldsAreaX = divX + 20;
    const fieldsAreaW = W - fieldsAreaX - pad;
    const numCols = 4;
    const colW = fieldsAreaW / numCols;
    const fields = [
      { label: 'GESTOR',            value: gestor   },
      { label: 'BASE',              value: base     },
      { label: 'COORDENADOR',       value: coord    },
      { label: 'SUPERVISOR',        value: superv   },
      { label: 'TEC / FISCAL',      value: tecfiscal},
      { label: 'EQUIPE',            value: equipe   },
      { label: 'OBRA',              value: obra     },
      { label: 'AÇÕES REALIZADAS',  value: acoes    },
    ];
 
    const rowH = (cabH - 28) / 2;
    ctx.textAlign = 'left';
    fields.forEach((f, i) => {
      const col = i % numCols;
      const row = Math.floor(i / numCols);
      const fx = fieldsAreaX + col * colW;
      const fy = 18 + row * rowH + 10;
 
      // Label
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = accentColor;
      ctx.fillText(f.label, fx, fy + 14);
 
      // Linha separadora
      ctx.fillStyle = '#cbd5e0';
      ctx.fillRect(fx, fy + 18, colW - 16, 1);
 
      // Value (ou traço se vazio)
      ctx.font = f.value ? '600 19px sans-serif' : '400 19px sans-serif';
      ctx.fillStyle = f.value ? textColor : '#94a3b8';
      ctx.fillText(f.value || '—', fx, fy + 40);
    });
  }
 
  // ── FOTOS ──
  const offY = cabH;
  if (layout === 'featured' && imgs.length > 1) {
    drawCover(ctx, imgs[0], 0, offY, W, Math.round(W*0.65));
    const sW = (W - gap*2)/3;
    const sH = sW*0.75;
    for (let i=0; i<3; i++) {
      if (imgs[i+1]) drawCover(ctx, imgs[i+1], i*(sW+gap), offY+Math.round(W*0.65)+gap, sW, sH);
    }
  } else {
    const cW = (W - gap*(cols-1)) / cols;
    const cH = cW*0.75;
    imgs.forEach((img, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      drawCover(ctx, img, col*(cW+gap), offY+row*(cH+gap), cW, cH);
    });
  }
 
  // ── RODAPÉ — sempre escuro para garantir leitura da frase ──
  const rodY = cabH + phtH;
  ctx.fillStyle = '#1c1e21';
  ctx.fillRect(0, rodY, W, rodH);
 
  // Linha vermelha no topo do rodapé
  ctx.fillStyle = '#b8001f';
  ctx.fillRect(0, rodY, W, 4);
 
  // Frase central — sempre branco (fundo escuro garantido)
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.font = 'bold 36px sans-serif';
  ctx.fillText(phrase, W/2, rodY + rodH/2 + 12);
 
  // ── LOGO INFERIOR DIREITA ──
  if (logo) {
    const lH = rodH * 0.55;
    const lW = logo.naturalWidth * (lH / logo.naturalHeight);
    ctx.drawImage(logo, W - lW - pad, rodY + (rodH - lH)/2, lW, lH);
  }
 
  document.getElementById('canvas-wrap').style.display = 'block';
  document.getElementById('btn-baixar').style.display = 'flex';
  setStatus('✅ Postagem Gerada!');
}
 
function drawCover(ctx, img, x, y, w, h) {
  const s  = Math.max(w/img.naturalWidth, h/img.naturalHeight);
  const sw = w/s, sh = h/s;
  const sx = (img.naturalWidth - sw)/2, sy = (img.naturalHeight - sh)/2;
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}
 
function downloadCollage() {
  const c = document.getElementById('main-canvas');
  const a = document.createElement('a');
  a.download = 'CGB_Post.jpg';
  c.toBlob(b => { a.href = URL.createObjectURL(b); a.click(); }, 'image/jpeg', 0.95);
}
 
function limpar() {
  images = []; loadedImgs = [];
  document.getElementById('preview-strip').innerHTML = '';
  document.getElementById('canvas-wrap').style.display = 'none';
  document.getElementById('btn-baixar').style.display = 'none';
  setStatus('');
}
 
function setStatus(m) { document.getElementById('status').textContent = m; }
</script>
